<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

                <div id="netSpeed">

                <div id="netType">VoLTE</div>

                <div id="batteryPer">73%</div>
                <div id="batteryIcon">🔋</div>
            </div>
        </div>
        <div class="middle">
            <div class="m1">
                <p id="circle"></p>
                <p id="circle"></p>
                <p id="circle"></p>
                <p id="circle"></p>
                <p id="circle"></p>
                <p id="circle"></p>
                <p id="circle"></p>
                <p id="circle"></p>
                <p id="circle"></p>
                <p id="circle"></p>
                <p id="circle"></p>
                <p id="circle"></p>
            </div>
            <div class="m2">
                <p id="brightnessSlider"></p>
                <p id="autoBrightness"></p>
            </div>
        </div>
        <div class="notifications">
            <p id="newNotifications"></p>
            <p id="newNotifications"></p>
            <p id="newNotifications"></p>
            <p id="newNotifications"></p>
            <p id="newNotifications"></p>
            <p id="newNotifications"></p>
            <p id="newNotifications"></p>
            <p id="newNotifications"></p>
            <p id="newNotifications"></p>
            <p id="newNotifications"></p>
            <p id="newNotificationsEmpty"></p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
